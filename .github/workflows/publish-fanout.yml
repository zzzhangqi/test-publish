name: publish-fanout

on:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'v') && endsWith(github.event.release.tag_name, '-release')
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch downstream release workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.FANOUT_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: 'test-fanout',
              workflow_id: 'sync-release.yml',
              ref: 'main',
              inputs: {
                version: '${{ github.event.release.tag_name }}',
                source_release_url: '${{ github.event.release.html_url }}'
              }
            });
